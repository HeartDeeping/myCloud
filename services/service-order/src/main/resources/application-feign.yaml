spring:
  cloud:
    openfeign:
      client:
        config:
          default:
            logger-level: BASIC
            connect-timeout: 2000
            read-timeout: 5000
          service-product:
            logger-level: full
            connect-timeout: 1000
            read-timeout: 1000
            request-interceptors:
              - com.hd.order.interceptor.XTokenRequestInterceptor
feign:
  sentinel:
    enabled: true

